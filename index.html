<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Trends — Operations Report</title>
<style>
  :root{
    --bg:#FAFAF7;--panel:#FFFFFF;--ink:#1A1A18;--sub:#6B6B63;--rule:#E4E2DA;
    --posted:#0F766E;--pending:#B45309;--users:#1D4ED8;--cum:#9333EA;
    --serif:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    --sans:ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
       -webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:940px;margin:0 auto;padding:30px 26px 60px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-end;
          border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:16px}
  .kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--sub)}
  h1{font-family:var(--serif);font-size:34px;font-weight:600;margin:4px 0 0;line-height:1.05}
  .tagline{font-size:13.5px;color:var(--sub);margin-top:6px}
  .btn{font-family:var(--sans);font-size:13px;padding:8px 16px;border:1px solid var(--ink);
       background:var(--ink);color:var(--bg);border-radius:4px;cursor:pointer}
  .grainbar{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .grainbar .glab{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--sub)}
  .toggle{display:flex;width:fit-content;border:1px solid var(--ink);border-radius:4px;overflow:hidden}
  .toggle button{font-family:var(--sans);font-size:13px;padding:7px 16px;border:none;
          background:transparent;color:var(--ink);cursor:pointer}
  .toggle button.on{background:var(--ink);color:var(--bg)}
  .sec-head{margin:30px 0 16px}
  .sec-kicker{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--sub)}
  h2{font-family:var(--serif);font-size:23px;font-weight:600;margin:3px 0 0}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
  .kpi{background:var(--panel);border:1px solid var(--rule);border-radius:4px;padding:12px 14px}
  .kpi .lab{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--sub)}
  .kpi .val{font-family:var(--serif);font-size:26px;font-weight:600;margin-top:4px}
  .kpi .sub{font-size:11.5px;color:var(--sub);margin-top:2px}
  .chart{background:var(--panel);border:1px solid var(--rule);border-radius:4px;padding:14px 10px 6px}
  .chart svg{width:100%;height:auto;display:block}
  .legend{display:flex;gap:18px;font-size:12.5px;color:var(--sub);padding:4px 8px 0}
  .legend i{display:inline-block;width:14px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle}
  .metricbar{display:flex;justify-content:flex-end;margin-bottom:10px}
  .foot{margin-top:30px;font-size:11.5px;color:var(--sub);border-top:1px solid var(--rule);padding-top:12px}
  @media print{body{background:#fff}.no-print{display:none !important}.chart,.kpi{break-inside:avoid}.wrap{max-width:none;padding:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <div class="kicker">Operations Report</div>
      <h1>Daily Trends</h1>
      <div class="tagline">Payment posting and new-user growth</div>
    </div>
    <button class="btn no-print" onclick="window.print()">Save as PDF</button>
  </div>

  <div class="grainbar no-print">
    <span class="glab">Aggregate by</span>
    <div class="toggle" id="grain-toggle">
      <button data-g="day" class="on">Daily</button>
      <button data-g="week">Weekly</button>
      <button data-g="month">Monthly</button>
    </div>
  </div>

  <div class="sec-head">
    <div class="sec-kicker">Payments container</div>
    <h2>Payments — Posted vs. Pending</h2>
  </div>
  <div class="kpis" id="pay-kpis"></div>
  <div class="metricbar no-print">
    <div class="toggle" id="pay-toggle">
      <button data-m="count" class="on">Count</button>
      <button data-m="amount">Dollar amount</button>
    </div>
  </div>
  <div class="chart">
    <div class="legend">
      <span><i style="background:var(--posted)"></i>Posted</span>
      <span><i style="background:var(--pending)"></i>Pending</span>
    </div>
    <div id="pay-chart"></div>
  </div>

  <div class="sec-head">
    <div class="sec-kicker">User container</div>
    <h2>Users Registered</h2>
  </div>
  <div class="kpis" id="usr-kpis"></div>
  <div class="chart">
    <div class="legend">
      <span><i style="background:var(--users)"></i>Registrations (left)</span>
      <span><i style="background:var(--cum)"></i>Cumulative (right)</span>
    </div>
    <div id="usr-chart"></div>
  </div>

  <div class="foot" id="foot">Loading data…</div>
</div>

<script>
const C={posted:"#0F766E",pending:"#B45309",users:"#1D4ED8",cum:"#9333EA",ink:"#1A1A18",sub:"#6B6B63",rule:"#E4E2DA"};
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
let payMetric="count",grain="day";

const FALLBACK_PAY=[
  {day:"2026-04-23",status:"Posted",paymentCount:2,totalAmount:4985.44},
  {day:"2026-04-25",status:"Posted",paymentCount:1,totalAmount:1927.43},
  {day:"2026-05-04",status:"Posted",paymentCount:1,totalAmount:300},
  {day:"2026-05-23",status:"Posted",paymentCount:1,totalAmount:1927.43},
  {day:"2026-05-25",status:"Posted",paymentCount:1,totalAmount:963.45},
  {day:"2026-05-26",status:"Posted",paymentCount:2,totalAmount:5475.4},
  {day:"2026-06-01",status:"Posted",paymentCount:1,totalAmount:2008.99},
  {day:"2026-06-02",status:"Posted",paymentCount:2,totalAmount:6658.25},
  {day:"2026-06-03",status:"Posted",paymentCount:34,totalAmount:57856.26},
  {day:"2026-06-04",status:"Posted",paymentCount:99,totalAmount:210259.28},
  {day:"2026-06-05",status:"Posted",paymentCount:129,totalAmount:321227.44},
  {day:"2026-06-06",status:"Posted",paymentCount:59,totalAmount:132831.97},
  {day:"2026-06-07",status:"Posted",paymentCount:42,totalAmount:90908.66},
  {day:"2026-06-08",status:"Posted",paymentCount:16,totalAmount:40786.63},
  {day:"2026-06-08",status:"Pending",paymentCount:46,totalAmount:100385.48}
];
const FALLBACK_USR=[
  {day:"2026-04-06",newUsers:1},{day:"2026-04-22",newUsers:1},{day:"2026-04-23",newUsers:2},
  {day:"2026-04-25",newUsers:1},{day:"2026-05-04",newUsers:1},{day:"2026-05-13",newUsers:1},
  {day:"2026-06-01",newUsers:7},{day:"2026-06-02",newUsers:14},{day:"2026-06-03",newUsers:179},
  {day:"2026-06-04",newUsers:268},{day:"2026-06-05",newUsers:212},{day:"2026-06-06",newUsers:111},
  {day:"2026-06-07",newUsers:81},{day:"2026-06-08",newUsers:117}
];
let PAY_DATA=FALLBACK_PAY, USR_DATA=FALLBACK_USR, SRC="built-in sample";

const fmtN=n=>Math.round(n).toLocaleString("en-US");
const fmtUSD=v=>"$"+Math.round(v).toLocaleString("en-US");
function normStatus(s){const v=String(s||"").trim().toLowerCase();
  if(v.startsWith("post"))return"Posted";if(v.startsWith("pend"))return"Pending";return"Other";}
function pivotPayments(rows){const m={};
  rows.forEach(r=>{if(!r.day)return;
    m[r.day]=m[r.day]||{day:r.day,postedCount:0,pendingCount:0,postedAmount:0,pendingAmount:0};
    const c=+r.paymentCount||0,a=+r.totalAmount||0,s=normStatus(r.status);
    if(s==="Posted"){m[r.day].postedCount+=c;m[r.day].postedAmount+=a;}
    else if(s==="Pending"){m[r.day].pendingCount+=c;m[r.day].pendingAmount+=a;}});
  return Object.values(m).sort((a,b)=>a.day<b.day?-1:1);}
function prepUsersDaily(rows){return rows.filter(r=>r.day).map(r=>({day:r.day,newUsers:+r.newUsers||0})).sort((a,b)=>a.day<b.day?-1:1);}
function eachDay(first,last,fn){let cur=new Date(first+"T00:00:00Z");const end=new Date(last+"T00:00:00Z");
  while(cur<=end){fn(cur.toISOString().slice(0,10));cur.setUTCDate(cur.getUTCDate()+1);}}
function fillPay(d){if(!d.length)return d;const map={};d.forEach(r=>map[r.day]=r);const out=[];
  eachDay(d[0].day,d[d.length-1].day,k=>out.push(map[k]||{day:k,postedCount:0,pendingCount:0,postedAmount:0,pendingAmount:0}));return out;}
function fillUsr(d){if(!d.length)return d;const map={};d.forEach(r=>map[r.day]=r);const out=[];
  eachDay(d[0].day,d[d.length-1].day,k=>out.push(map[k]||{day:k,newUsers:0}));return out;}
function weekStart(isoDay){const d=new Date(isoDay+"T00:00:00Z");d.setUTCDate(d.getUTCDate()-((d.getUTCDay()+6)%7));return d.toISOString().slice(0,10);}
function bucketKey(day){if(grain==="week")return weekStart(day);if(grain==="month")return day.slice(0,7);return day;}
function rollupPay(daily){if(grain==="day")return daily;const m={};
  daily.forEach(r=>{const k=bucketKey(r.day);m[k]=m[k]||{day:k,postedCount:0,pendingCount:0,postedAmount:0,pendingAmount:0};
    m[k].postedCount+=r.postedCount;m[k].pendingCount+=r.pendingCount;m[k].postedAmount+=r.postedAmount;m[k].pendingAmount+=r.pendingAmount;});
  return Object.values(m).sort((a,b)=>a.day<b.day?-1:1);}
function rollupUsr(daily){if(grain==="day")return daily.map(r=>({day:r.day,newUsers:r.newUsers}));const m={};
  daily.forEach(r=>{const k=bucketKey(r.day);m[k]=m[k]||{day:k,newUsers:0};m[k].newUsers+=r.newUsers;});
  return Object.values(m).sort((a,b)=>a.day<b.day?-1:1);}
function fmtX(lab){if(grain==="month"){const p=lab.split("-");return MON[(+p[1])-1]+" "+p[0].slice(2);}return lab.slice(5);}
function axisMax(max){if(!isFinite(max)||max<=0)return 4;const exp=Math.floor(Math.log10(max)),base=Math.pow(10,exp),f=max/base;
  let nf;if(f<=1)nf=1;else if(f<=1.5)nf=1.5;else if(f<=2)nf=2;else if(f<=3)nf=3;else if(f<=5)nf=5;else nf=10;return nf*base;}
function svgChart(labels,series,fmtL,fmtR){
  const W=860,H=320,mL=64,mT=14,mB=36;const hasR=series.some(s=>s.axis==="right");const mR=hasR?68:18;
  const pW=W-mL-mR,pH=H-mT-mB,n=labels.length;let lMax=0,rMax=0;
  series.forEach(s=>s.vals.forEach(v=>{if(s.axis==="right"){if(v>rMax)rMax=v;}else if(v>lMax)lMax=v;}));
  const lAx=axisMax(lMax),rAx=axisMax(rMax);
  const xAt=i=>n<=1?mL+pW/2:mL+(pW*i)/(n-1);const yL=v=>mT+pH-(pH*v)/lAx;const yR=v=>mT+pH-(pH*v)/rAx;
  let g="";
  for(let k=0;k<=4;k++){const y=mT+pH-(pH*k)/4;
    g+=`<line x1="${mL}" y1="${y.toFixed(1)}" x2="${W-mR}" y2="${y.toFixed(1)}" stroke="${C.rule}" stroke-width="1"/>`;
    g+=`<text x="${mL-8}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="11" fill="${C.sub}" font-family="ui-sans-serif,system-ui">${fmtL(lAx*k/4)}</text>`;
    if(hasR)g+=`<text x="${W-mR+8}" y="${(y+4).toFixed(1)}" text-anchor="start" font-size="11" fill="${C.cum}" font-family="ui-sans-serif,system-ui">${fmtR(rAx*k/4)}</text>`;}
  const step=Math.max(1,Math.ceil(n/12));
  labels.forEach((lab,i)=>{if(i%step!==0 && i!==n-1)return;
    g+=`<text x="${xAt(i).toFixed(1)}" y="${H-12}" text-anchor="middle" font-size="11" fill="${C.sub}" font-family="ui-sans-serif,system-ui">${fmtX(lab)}</text>`;});
  series.forEach(s=>{const yf=s.axis==="right"?yR:yL;const pts=s.vals.map((v,i)=>`${xAt(i).toFixed(1)},${yf(v).toFixed(1)}`).join(" ");
    if(s.fill && n>1)g+=`<polyline points="${mL},${(mT+pH)} ${pts} ${(xAt(n-1)).toFixed(1)},${(mT+pH)}" fill="${s.color}" fill-opacity="0.10" stroke="none"/>`;
    g+=`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.4" ${s.dashed?'stroke-dasharray="5 3"':''} stroke-linejoin="round" stroke-linecap="round"/>`;
    if(n<=40)s.vals.forEach((v,i)=>{g+=`<circle cx="${xAt(i).toFixed(1)}" cy="${yf(v).toFixed(1)}" r="2.4" fill="${s.color}"><title>${labels[i]}: ${(s.axis==="right"?fmtR:fmtL)(v)}</title></circle>`;});});
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="trend chart">${g}</svg>`;}
function kpi(lab,val,sub,color){return `<div class="kpi"><div class="lab">${lab}</div><div class="val"${color?` style="color:${color}"`:''}>${val}</div><div class="sub">${sub}</div></div>`;}
function periodLabel(){return grain==="day"?"Days":grain==="week"?"Weeks":"Months";}
function render(){
  const d=rollupPay(fillPay(pivotPayments(PAY_DATA)));
  const t=d.reduce((a,r)=>({pc:a.pc+r.postedCount,qc:a.qc+r.pendingCount,pa:a.pa+r.postedAmount,qa:a.qa+r.pendingAmount}),{pc:0,qc:0,pa:0,qa:0});
  const rate=(t.pc+t.qc)?(t.pc/(t.pc+t.qc)*100):0;const range=d.length?`${d[0].day} → ${d[d.length-1].day}`:"—";
  document.getElementById("pay-kpis").innerHTML=
    kpi("Posted",fmtN(t.pc),fmtUSD(t.pa),C.posted)+kpi("Pending",fmtN(t.qc),fmtUSD(t.qa),C.pending)+
    kpi("Post rate",rate.toFixed(1)+"%","of all payments")+kpi(periodLabel(),fmtN(d.length),range);
  const isC=payMetric==="count";
  const ps=[{color:C.posted,fill:true,vals:d.map(r=>isC?r.postedCount:r.postedAmount)},
            {color:C.pending,dashed:true,vals:d.map(r=>isC?r.pendingCount:r.pendingAmount)}];
  document.getElementById("pay-chart").innerHTML=svgChart(d.map(r=>r.day),ps,isC?fmtN:fmtUSD,fmtN);

  const u=rollupUsr(fillUsr(prepUsersDaily(USR_DATA)));
  const total=u.reduce((s,r)=>s+r.newUsers,0);const active=u.filter(r=>r.newUsers>0);
  const peak=active.reduce((m,r)=>r.newUsers>m.newUsers?r:m,{newUsers:0,day:"—"});
  const avg=active.length?total/active.length:0;const urange=u.length?`${u[0].day} → ${u[u.length-1].day}`:"—";
  const perLab=grain==="day"?"day":grain==="week"?"week":"month";
  document.getElementById("usr-kpis").innerHTML=
    kpi("Registrations",fmtN(total),"in range",C.users)+kpi("Peak "+perLab,fmtN(peak.newUsers),peak.day,C.users)+
    kpi("Avg / active "+perLab,avg.toFixed(1),"registrations")+kpi(periodLabel(),fmtN(u.length),urange);
  let run=0;const cum=u.map(r=>run+=r.newUsers);
  const us=[{color:C.users,fill:true,vals:u.map(r=>r.newUsers),axis:"left"},{color:C.cum,vals:cum,axis:"right"}];
  document.getElementById("usr-chart").innerHTML=svgChart(u.map(r=>r.day),us,fmtN,fmtN);

  document.getElementById("foot").textContent="Source: "+SRC+" · rendered "+new Date().toLocaleString();
}
document.querySelectorAll("#grain-toggle button").forEach(b=>{b.onclick=()=>{grain=b.dataset.g;
  document.querySelectorAll("#grain-toggle button").forEach(x=>x.classList.toggle("on",x===b));render();};});
document.querySelectorAll("#pay-toggle button").forEach(b=>{b.onclick=()=>{payMetric=b.dataset.m;
  document.querySelectorAll("#pay-toggle button").forEach(x=>x.classList.toggle("on",x===b));render();};});
async function load(name){try{const r=await fetch(name,{cache:"no-store"});if(!r.ok)throw 0;const j=await r.json();return Array.isArray(j)?j:null;}catch(e){return null;}}
(async function init(){
  const p=await load("payments.json"),u=await load("users.json");
  if(p){PAY_DATA=p;SRC="payments.json + users.json";}
  if(u)USR_DATA=u;
  if(!p&&!u)SRC="built-in sample (JSON files not found)";
  render();
})();
</script>
</body>
</html>
